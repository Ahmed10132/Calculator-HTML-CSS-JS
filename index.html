<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-parent">
         <div class="main">
        <div class="screen">
            <div class="calcs">
            </div>
            <div class="result"></div>
        </div>
        
        <div class="buttons">
             <div class="numbers">
                <div class="one">
                  <!-- added using JS -->
                </div>
                <div class="two">
                      <!-- added using JS -->
                </div>
                <div class="three">
                       <!-- added using JS -->
                </div>
                <div class="four">
                       <!-- added using JS -->
                </div>
             </div>
             <div class="operations-main">
                 <div class="reset">Reset</div>
                 <div class="operations">
                    <div class="op1">
                        <div class="mul">
                            x
                        </div>
                        <div class="divi">
                        /
                        </div>
                    </div>                   
                    <div class="op2">
                        <div class="plus">+</div>
                        <div class="minus">-</div>
                    </div>
                    <div class="op3">
                        <div class="ans">Ans</div>
                        <div class="equal">=</div>
                </div>
                 </div>
             </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
    </div>
   
</html>
